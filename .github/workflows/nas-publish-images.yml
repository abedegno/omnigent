name: NAS fork images
on:
  push:
    branches: [nas-deploy]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build-and-push:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: sha
        run: echo "short=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Build and push server
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/abedegno/omnigent-server:${{ steps.sha.outputs.short }}
      - name: Build and push host
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: deploy/docker/Dockerfile
          target: host
          push: true
          platforms: linux/amd64
          tags: ghcr.io/abedegno/omnigent-host:${{ steps.sha.outputs.short }}
